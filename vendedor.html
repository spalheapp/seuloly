<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Painel do Vendedor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍇</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--roxo-dark:#1a0035;--amarelo:#FFD700;--amarelo2:#FF9900;--verde:#00e676}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:'Nunito',sans-serif;background:var(--roxo-dark);min-height:100vh;color:#fff}.bg-stars{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;background:radial-gradient(ellipse at 10% 0%, rgba(98,0,179,.7) 0%, transparent 55%),radial-gradient(ellipse at 90% 100%, rgba(255,153,0,.15) 0%, transparent 55%),var(--roxo-dark)}.wrap{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:20px 14px 60px}.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.18);border-radius:22px;padding:22px 18px;margin-bottom:14px;backdrop-filter:blur(8px)}.card-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--amarelo);margin-bottom:6px}.card-desc{color:rgba(255,255,255,.65);font-size:14px;line-height:1.5;margin-bottom:18px}.input{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:15px;outline:none;margin-bottom:10px}.input:focus{border-color:var(--amarelo)}.btn{width:100%;padding:14px;border-radius:14px;border:none;font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:1.5px;cursor:pointer}.btn-gold{background:linear-gradient(135deg,var(--amarelo),var(--amarelo2));color:#1a0035}.btn-ghost{margin-top:8px;background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7)}.msg{display:none;margin-top:12px;padding:10px 12px;border-radius:12px;font-size:13px;font-weight:800}.msg.on{display:block}.msg.ok{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:#00e676}.msg.err{background:rgba(255,70,70,.15);border:1px solid rgba(255,70,70,.35);color:#ff8888}.hidden{display:none!important}.top-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}.stat{background:rgba(255,255,255,.05);border-radius:12px;padding:12px;text-align:center}.stat strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--amarelo);letter-spacing:1px}.stat span{font-size:11px;color:rgba(255,255,255,.55);font-weight:800;text-transform:uppercase}.codigo-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:11px 12px;border-radius:12px;margin-bottom:8px}.cod-ok{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25)}.cod-used{background:rgba(255,70,70,.08);border:1px solid rgba(255,70,70,.2)}.cod-val{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px}.cod-status{font-size:11px;font-weight:900;letter-spacing:1px}.row-actions{display:flex;gap:6px}.mini-btn{border:none;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:12px;font-weight:900}.mini-edit{background:#FFD700;color:#1a0035}.mini-del{background:#ff6b6b;color:#fff}.sep{height:1px;background:rgba(255,255,255,.08);margin:16px 0}.link-btn{text-decoration:none;display:block;text-align:center}
</style>
</head>
<body>
<div class="bg-stars"></div>
<div class="wrap">
  <div class="card" id="login-card">
    <div class="card-title">🔐 Login do Vendedor</div>
    <div class="card-desc">Entre com seu usuário e senha para gerenciar os códigos.</div>
    <input class="input" id="login-user" placeholder="Usuário">
    <input class="input" id="login-pass" type="password" placeholder="Senha">
    <button class="btn btn-gold" onclick="login()">ENTRAR</button>
    <div class="msg err" id="login-msg"></div>
  </div>
  <div id="panel" class="hidden">
    <div class="card">
      <div class="card-title">⚙️ Painel do Vendedor</div>
      <div class="card-desc">Gerencie os códigos e acompanhe o uso.</div>
      <div class="top-stats"><div class="stat"><strong id="st-total">0</strong><span>Total</span></div><div class="stat"><strong id="st-used">0</strong><span>Usados</span></div><div class="stat"><strong id="st-revealed">0</strong><span>Figurinhas</span></div></div>
      <input class="input" id="new-code" maxlength="10" placeholder="Novo código" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9-]/g,'')">
      <button class="btn btn-gold" onclick="addCode()">+ ADICIONAR CÓDIGO</button>
      <div class="msg" id="panel-msg"></div>
      <div class="sep"></div>
      <div id="codes-list"></div>
    </div>
    <a class="btn btn-ghost link-btn" href="/">← Voltar para o site</a>
  </div>
</div>
<script>
function showMsg(el,text,type){el.className=`msg on ${type}`;el.textContent=text;}
async function login(){const username=document.getElementById('login-user').value.trim();const password=document.getElementById('login-pass').value.trim();const msg=document.getElementById('login-msg');msg.className='msg err';msg.textContent='';try{const res=await fetch('/api/admin-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});const data=await res.json();if(!res.ok||!data.ok){showMsg(msg,data.message||'Falha no login.','err');return;}sessionStorage.setItem('sl_admin_ok','1');document.getElementById('login-card').classList.add('hidden');document.getElementById('panel').classList.remove('hidden');await loadStats();await loadCodes();}catch{showMsg(msg,'Falha na requisição.','err');}}
async function loadStats(){try{const res=await fetch('/api/admin-status');const data=await res.json();document.getElementById('st-total').textContent=data.totalCodes||0;document.getElementById('st-used').textContent=data.usedCount||0;document.getElementById('st-revealed').textContent=data.revealedCount||0;}catch{}}
async function loadCodes(){const list=document.getElementById('codes-list');try{const res=await fetch('/api/admin-codes');const data=await res.json();list.innerHTML='';(data.codes||[]).forEach(item=>{const row=document.createElement('div');row.className='codigo-row '+(item.used?'cod-used':'cod-ok');row.innerHTML=`<div><div class="cod-val">${item.code}</div><div class="cod-status" style="color:${item.used?'#ff8888':'#00e676'}">${item.used?'❌ USADO':'✅ DISPONÍVEL'}</div></div><div class="row-actions">${item.used?'':`<button class="mini-btn mini-edit" onclick="editCode('${item.code}')">EDITAR</button>`}${item.used?'':`<button class="mini-btn mini-del" onclick="deleteCode('${item.code}')">EXCLUIR</button>`}</div>`;list.appendChild(row);});}catch{list.innerHTML='<div class="msg on err">Falha na requisição.</div>';}}
async function addCode(){const newCode=document.getElementById('new-code').value.trim().toUpperCase().replace(/[^A-Z0-9-]/g,'');const msg=document.getElementById('panel-msg');try{const res=await fetch('/api/admin-codes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'add',newCode})});const data=await res.json();showMsg(msg,data.message,data.ok?'ok':'err');if(data.ok){document.getElementById('new-code').value='';await loadStats();await loadCodes();}}catch{showMsg(msg,'Falha na requisição.','err');}}
async function editCode(oldCode){const newCode=prompt('Editar código:',oldCode);if(newCode===null)return;const msg=document.getElementById('panel-msg');try{const res=await fetch('/api/admin-codes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'edit',oldCode,newCode})});const data=await res.json();showMsg(msg,data.message,data.ok?'ok':'err');if(data.ok){await loadStats();await loadCodes();}}catch{showMsg(msg,'Falha na requisição.','err');}}
async function deleteCode(oldCode){if(!confirm(`Excluir o código ${oldCode}?`))return;const msg=document.getElementById('panel-msg');try{const res=await fetch('/api/admin-codes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete',oldCode})});const data=await res.json();showMsg(msg,data.message,data.ok?'ok':'err');if(data.ok){await loadStats();await loadCodes();}}catch{showMsg(msg,'Falha na requisição.','err');}}
(function boot(){if(sessionStorage.getItem('sl_admin_ok')==='1'){document.getElementById('login-card').classList.add('hidden');document.getElementById('panel').classList.remove('hidden');loadStats();loadCodes();}})();
</script>
</body>
</html>
